name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Runs on every push and PR ──────────────────────────────────────────────
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # opencv-python needs libgl1; pystray needs an X display on headless Linux
      - name: Install system dependencies (Linux)
        run: sudo apt-get install -y libgl1 xvfb

      - name: Start virtual display (Xvfb)
        run: Xvfb :99 -screen 0 1024x768x24 &
        env:
          DISPLAY: :99

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
        env:
          DISPLAY: :99

  # ── Runs only on version tags (e.g. v1.0.0) ───────────────────────────────
  build-windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test                   # only build if tests pass
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: pyinstaller --onefile --name TVDistanceMonitor --noconsole main.py

      - name: Upload .exe as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVDistanceMonitor-windows-${{ github.ref_name }}
          path: dist/TVDistanceMonitor.exe
          retention-days: 30

      # Attach the .exe directly to the GitHub Release page
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TVDistanceMonitor.exe
