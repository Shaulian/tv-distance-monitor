name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Runs on every push and PR ──────────────────────────────────────────────
  test:
    name: Lint & Unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # opencv-python needs libgl1; pystray needs an X display on headless Linux
      - name: Install system dependencies (Linux)
        run: sudo apt-get install -y libgl1 xvfb

      - name: Start virtual display (Xvfb)
        run: Xvfb :99 -screen 0 1024x768x24 &
        env:
          DISPLAY: :99

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      # Run unit + integration in the same coverage pass so the visibility
      # floor below reflects all reachable code, including main.py's
      # startup orchestration (covered by tests/integration/). The dedicated
      # integration job below still runs separately to enforce the marker.
      - name: Unit + integration tests + coverage data
        env:
          DISPLAY: :99
        run: pytest tests/unit/ tests/integration/ --cov --cov-report=term-missing -v

      # Layered coverage gates — see docs/testing-strategy.md.
      # Core-logic gate is the primary quality bar; raise it as coverage rises.
      - name: "Quality gate: core-logic branch coverage ≥ 90%"
        run: |
          coverage report \
            --include="audio/*,camera/*,config/*,detection/*,state.py" \
            --fail-under=90

      # Full-codebase floor includes main.py + tray/*. Ratchets up over time;
      # never lower (per ADR-014). The current baseline is ~57% after WS3
      # brought main.py from 0% into integration coverage. Floor set a few
      # points below to absorb measurement noise.
      - name: "Visibility floor: full-codebase branch coverage ≥ 55%"
        run: coverage report --fail-under=55

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage
          retention-days: 7

  # ── Integration tier (blocking; tolerates "no tests yet" via exit 5) ───────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Linux)
        run: sudo apt-get install -y libgl1 xvfb

      - name: Start virtual display (Xvfb)
        run: Xvfb :99 -screen 0 1024x768x24 &
        env:
          DISPLAY: :99

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        env:
          DISPLAY: :99
        run: |
          set +e
          pytest tests/integration/ -m integration -v
          code=$?
          if [ $code -eq 5 ]; then
            echo "::notice::No integration tests collected yet — landing soon (WS1)."
            exit 0
          fi
          exit $code

  # ── Performance tier (advisory until WS4 budgets land) ─────────────────────
  performance:
    name: Performance tests (advisory)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Linux)
        run: sudo apt-get install -y libgl1 xvfb

      - name: Start virtual display (Xvfb)
        run: Xvfb :99 -screen 0 1024x768x24 &
        env:
          DISPLAY: :99

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run performance tests
        env:
          DISPLAY: :99
        run: |
          set +e
          pytest tests/performance/ -m performance -v
          code=$?
          if [ $code -eq 5 ]; then
            echo "::notice::No performance tests collected yet — landing in WS4."
            exit 0
          fi
          exit $code

  # ── Runs only on version tags (e.g. v1.0.0) ───────────────────────────────
  build-windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: [test, integration]   # unit + integration must pass before tagging a release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: pyinstaller --onefile --name TVDistanceMonitor --noconsole main.py

      - name: Upload .exe as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVDistanceMonitor-windows-${{ github.ref_name }}
          path: dist/TVDistanceMonitor.exe
          retention-days: 30

      # Attach the .exe directly to the GitHub Release page
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TVDistanceMonitor.exe
