[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "venv"

[tool.ruff]
line-length = 100
exclude = ["venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "integration: exercises multiple modules together (real wiring, fixtures for hardware)",
    "performance: asserts a timing or memory budget",
    "slow: long-running; skip with -m 'not slow'",
]

[tool.coverage.run]
branch = true
source = ["."]
omit = ["tests/*", "venv/*", "*/__pycache__/*", "tvdm.spec"]

[tool.coverage.report]
show_missing = true

# Mutation testing — see ADR-018. Scoped to detection/ (the highest-stakes
# pure-logic modules: stereo depth + fail-safe policy + HOG cache). Runs
# weekly in CI; a per-PR run is too slow.
[tool.mutmut]
paths_to_mutate = "detection/"
tests_dir = "tests/unit/"
runner = "python -m pytest tests/unit/test_depth_estimator.py tests/unit/test_depth_estimator_properties.py tests/unit/test_person_detector.py -x --tb=no -q"
