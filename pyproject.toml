[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "venv"

[tool.ruff]
line-length = 100
exclude = ["venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "integration: exercises multiple modules together (real wiring, fixtures for hardware)",
    "performance: asserts a timing or memory budget",
    "slow: long-running; skip with -m 'not slow'",
]

[tool.coverage.run]
branch = true
source = ["."]
omit = ["tests/*", "venv/*", "*/__pycache__/*", "tvdm.spec"]

[tool.coverage.report]
show_missing = true
